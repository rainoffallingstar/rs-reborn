name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:
    inputs:
      run_benchmarks:
        description: "Run optional performance benchmark job"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  go-test:
    name: Go Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  cli-smoke:
    name: CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run CLI smoke coverage (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/ci/e2e-smoke.sh

      - name: Run CLI smoke coverage (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/ci/e2e-smoke.ps1

  r-bootstrap-guidance:
    name: R Bootstrap Guidance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run R bootstrap guidance E2E (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/ci/e2e-r-bootstrap-guidance.sh

      - name: Run R bootstrap guidance E2E (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/ci/e2e-r-bootstrap-guidance.ps1

  managed-current-default:
    name: Managed Current Default (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run managed-current default E2E
        run: bash scripts/ci/e2e-r-managed-current.sh

  toolchain-doctor:
    name: Toolchain Doctor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run toolchain-only doctor E2E
        run: bash scripts/ci/e2e-toolchain-doctor.sh

  toolchain-cli:
    name: Toolchain CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run toolchain CLI E2E
        run: bash scripts/ci/e2e-toolchain-cli.sh

  toolchain-enva:
    name: Toolchain Enva Priority (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run toolchain enva-priority E2E
        run: bash scripts/ci/e2e-toolchain-enva.sh

  toolchain-enva-runtime:
    name: Toolchain Enva Runtime (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run toolchain enva runtime E2E
        run: bash scripts/ci/e2e-toolchain-enva-run.sh

  release-install-smoke:
    name: Release Install Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release install smoke E2E (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/ci/e2e-release-install.sh

      - name: Run release install smoke E2E (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/ci/e2e-release-install.ps1

  local-source-drift:
    name: Local Source Drift
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run local source drift E2E
        run: bash scripts/ci/e2e-local-source.sh

  doctor-failures:
    name: Doctor Failures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run doctor failure E2E
        run: bash scripts/ci/e2e-doctor-failures.sh

  git-source:
    name: Git Source
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run git source E2E
        run: bash scripts/ci/e2e-git-source.sh

  cache-rebuild:
    name: Cache Rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run cache rebuild E2E
        run: bash scripts/ci/e2e-cache-rebuild.sh

  multi-script-project:
    name: Multi Script Project
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run multi-script project E2E
        run: bash scripts/ci/e2e-multi-script-project.sh

  native-backend:
    name: Native Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run native backend E2E (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/ci/e2e-native-backend.sh

      - name: Run native backend E2E (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/ci/e2e-native-backend.ps1

  native-cran-archive:
    name: Native CRAN Archive
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run native CRAN archive E2E
        run: bash scripts/ci/e2e-native-cran-archive.sh

  native-github:
    name: Native GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run native GitHub E2E
        run: bash scripts/ci/e2e-native-github.sh

  native-bioc:
    name: Native Bioconductor
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Run native Bioconductor E2E
        run: bash scripts/ci/e2e-native-bioc.sh

  pak-backend:
    name: Pak Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies for pak
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev pkg-config

      - name: Run pak backend E2E (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/ci/e2e-pak-backend.sh

      - name: Run pak backend E2E (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/ci/e2e-pak-backend.ps1

  native-r-manager:
    name: Native R Manager (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies for Ubuntu source fallback
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libbz2-dev libcurl4-openssl-dev libicu-dev liblzma-dev libpcre2-dev libreadline-dev xorg-dev zlib1g-dev

      - name: Run native R manager E2E (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/ci/e2e-r-manager.sh

      - name: Run native R manager E2E (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/ci/e2e-r-manager.ps1

  benchmarks:
    name: Benchmarks (Optional)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_benchmarks }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create benchmark output directory
        run: mkdir -p bench-out

      - name: Capture benchmark baseline
        env:
          RS_BENCH_OUT: bench-out
        run: bash scripts/bench/capture-baseline.sh

      - name: Append benchmark summary
        run: |
          {
            echo "## Benchmarks"
            echo
            cat bench-out/SUMMARY.md
            if [ -f bench-out/DIFF.md ]; then
              echo
              cat bench-out/DIFF.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: bench-out/

  native-r-manager-source:
    name: Native R Manager Source
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies for R source builds
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libbz2-dev libcurl4-openssl-dev libicu-dev liblzma-dev libpcre2-dev libreadline-dev xorg-dev zlib1g-dev

      - name: Run native R manager source E2E
        run: bash scripts/ci/e2e-r-manager-source.sh
